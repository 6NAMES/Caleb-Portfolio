{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Caleb Willingham – Software Engineer{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    {% block extra_css %}{% endblock %}
</head>

<body data-theme="">
    <!-- 🔼 Left-Aligned Hamburger Navbar -->
    <nav class="navbar navbar-dark bg-dark fixed-top">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <!-- Hamburger Toggle on the left -->
            <button class="navbar-toggler order-0 me-2" type="button" data-bs-toggle="offcanvas"
                data-bs-target="#navDrawer">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Brand name to the right of hamburger -->
            <a class="navbar-brand ms-2 me-auto" href="/">Caleb Willingham</a>

        <!-- Offcanvas Drawer -->
        <div class="offcanvas offcanvas-start text-bg-dark" tabindex="-1" id="navDrawer">
            <div class="offcanvas-header">
                <h5 class="offcanvas-title">Navigate</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"
                    aria-label="Close"></button>
            </div>
            <div class="offcanvas-body">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="#projects">📁 Projects</a></li>
                    <li class="nav-item"><a class="nav-link" href="#about">👤 About</a></li>
                    <li class="nav-item"><a class="nav-link" href="#contact">✉️ Contact</a></li>
                    <li class="nav-item"><a class="nav-link" href="#resume">📄 Resume</a></li>
                    </li>
                </ul>
            </div>
        </div>
    </nav>


    <!-- 🔽 Main Content -->
    <main style="padding-top: 80px;">
        {% block content %}{% endblock %}
    </main>

    <!-- 🔻 Scripts -->
    <script src="{% static 'js/base.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>

</html>
