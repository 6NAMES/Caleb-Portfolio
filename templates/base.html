{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Caleb Willingham – Software Engineer{% endblock %}</title>

  <!-- Fonts & Styles -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'css/base.css' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  {% block extra_css %}{% endblock %}
</head>

<body>

  <!-- 🧭 Modern Minimal Navbar -->
  <nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container-fluid justify-content-between align-items-center px-4">

      <!-- Left: Logo -->
      <a class="navbar-brand fw-bold text-dark" href="/">EUG.</a>

      <!-- Center: Navigation Links -->
      <div class="d-none d-lg-flex mx-auto">
        <ul class="navbar-nav gap-4">
          <li class="nav-item"><a class="nav-link active text-dark fw-semibold" href="#">Home</a></li>
          <li class="nav-item"><a class="nav-link text-dark" href="#projects">Works</a></li>
          <li class="nav-item"><a class="nav-link text-dark" href="#about">Bio</a></li>
          <li class="nav-item"><a class="nav-link text-dark" href="#certs">Certs</a></li>
        </ul>
      </div>

      <!-- Right: Contact Me Button -->
      <a href="#contact" class="btn btn-dark rounded-pill px-4">Contact me</a>
    </div>
  </nav>

  <!-- 🔽 Main Page Content -->
  <main style="padding-top: 60px;">
    {% block content %}{% endblock %}
  </main>

  <!-- 🔻 Footer Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'js/base.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
