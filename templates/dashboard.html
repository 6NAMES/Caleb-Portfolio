{% extends "base.html" %}
{% load static %}

{% block title %}Dashboard – Caleb Willingham{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/dashboard.css' %}">

{% endblock %}

{% block content %}
<section class="hero">
  <div class="overlay"></div>
  <div class="content">
    <h1 class="name">Caleb Willingham</h1>
    <h2 class="title">Software Engineer</h2>

      <a href="#projects" class="btn">View Projects</a>
      <a href="#contact" class="btn btn-outline">Contact Me</a>

  </div>
</section>
{% endblock %}

{% block extra_js %}

{% endblock %}
