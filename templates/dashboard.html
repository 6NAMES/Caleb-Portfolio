{% extends "base.html" %}
{% load static %}

{% block title %}Caleb Willingham – Software Engineer{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
<link href="https://fonts.googleapis.com/css2?family=Fira+Code&display=swap" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="dashboard-wrapper container-fluid">
  <!-- Left: Text & Terminal -->
  <div class="hero-text">
    <h1>Web Developer /<br>Software Engineer</h1>

    <div class="terminal-box">
      <span class="prompt"><span class="green">computer</span>:<span class="tilde">~$</span></span>
      <span class="message"> Greetings, fellow humans! 👋😃</span>
    </div>

    <div class="social-icons">
      <a href="#" aria-label="GitHub"><i class="fab fa-github"></i></a>
      <a href="#" aria-label="LinkedIn"><i class="fab fa-linkedin"></i></a>
      <a href="#" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
    </div>
  </div>

  <!-- Right: Illustration -->
  <div class="hero-image">
    <img src="{% static 'images/illustration.svg' %}" alt="Illustration of developer" />
  </div>
</div>
{% endblock %}
